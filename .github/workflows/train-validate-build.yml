name: Train, Validate, and Build

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-train.txt

      - name: Train and validate model
        run: python train.py   # fails (non-zero exit) if F1/recall are below threshold

      - name: Upload freshly trained model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: outputs/selected_loan_default_model.joblib

  build-and-push:
    needs: train          # <-- only runs if the train job above succeeded
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download the model that JUST passed validation
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: .            # overwrites the old committed .joblib with the fresh one

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
